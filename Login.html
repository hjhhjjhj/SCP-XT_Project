<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <title>登录 - SCP-XT Project</title>
        <link rel="stylesheet" href="style.css">
        <script>
        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }
            try {
                const res = await fetch('users.json');
                const users = await res.json();
                const user = users.find(u => u.username === username && u.password === password);
                if (user) {
                    localStorage.setItem('scp_user', JSON.stringify(user));
                    window.location.href = 'index.html';
                } else {
                    alert('用户名或密码错误');
                }
            } catch (e) {
                alert('读取用户数据失败');
            }
        }
        </script>
    </head>
    <body>
        <div class="scp-document">
            <div id="top_title" class="top_title_class">
                <header>
                    <h1>SCP-XT 项目 登录</h1>
                    <nav>
                        <a href="index.html">首页</a> <a href="SCP-XT_objects.html">SCP-XT对象</a> <a href="foundation_members.html">基金会成员</a> <a href="Login.html">登录</a>
                    </nav>
                </header>
            </div>
            <div style="max-width:400px;margin:2rem auto;padding:1rem;border:1px solid #c4b99a;border-radius:4px;background:rgba(255,255,240,0.6);">
                <h1 style="text-align:center;margin-bottom:1.2rem;">身份验证</h1>
                <form onsubmit="handleLogin(event);">
                    <div style="margin-bottom:0.8rem;">
                        <label for="username" style="display:block;font-weight:600;margin-bottom:0.3rem;color:#000;">用户名</label>
                        <input type="text" id="username" name="username" style="width:100%;padding:0.4rem;border:1px solid #c4b99a;border-radius:3px;background:#f5f0e8;font-family:inherit;color:#000;">
                    </div>
                    <div style="margin-bottom:1.2rem;">
                        <label for="password" style="display:block;font-weight:600;margin-bottom:0.3rem;color:#000;">密码</label>
                        <input type="password" id="password" name="password" style="width:100%;padding:0.4rem;border:1px solid #c4b99a;border-radius:3px;background:#f5f0e8;font-family:inherit;color:#000;">
                    </div>
                    <button type="submit" style="width:100%;padding:0.5rem;background:#8b0000;color:#fff;border:none;border-radius:3px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:2px;">登 录</button>
                </form>
                <p style="text-align:center;margin-top:0.8rem;font-size:0.75rem;color:#6b5b4e;">仅限授权人员访问</p>
            </div>
        </div>
    </body>
</html>
