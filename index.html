<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <title>SCP-XT Project</title>
        <link rel="stylesheet" href="style.css">
        <script>
        function updateAuthUI() {
            const data = localStorage.getItem('scp_user');
            const nav = document.querySelector('nav');
            const loginLink = nav.querySelector('a[href="Login.html"]');
            if (data) {
                const user = JSON.parse(data);
                loginLink.textContent = '登出';
                loginLink.href = '#';
                loginLink.onclick = function(e) {
                    e.preventDefault();
                    localStorage.removeItem('scp_user');
                    location.reload();
                };
                const info = document.createElement('span');
                info.style.cssText = 'margin-left:auto;font-size:0.8rem;font-weight:600;color:#8b0000;font-family:"Courier New",monospace;';
                info.textContent = user.username + ' | 权限等级 ' + user.permission_level;
                document.querySelector('#top_title header').appendChild(info);
            }
        }
        document.addEventListener('DOMContentLoaded', updateAuthUI);
        </script>
    </head>
    <body>
        <div class="scp-document">
        <div id="top_title" class="top_title_class">
            <header>
                <h1>SCP-XT 项目</h1>
            </header>
            <nav>
                <a href="index.html">首页</a> <a href="SCP-XT_objects.html">SCP-XT对象</a> <a href="foundation_members.html">基金会成员</a> <a href="Login.html">登录</a>
            </nav>
        </div>
        <div>
            <div id="main_mid_page">
                <h1> SCP-XT档案(原本) </h1>
                <p>(▇▇▇▇专属手册)</p>
                <p>查阅权限：B级以上</p>
                <p>编辑权限：A级以上</p>
                <p>(注：SCP-XT-001~SCP-XT-010暂不录入)</p>
            </div>
        </div>
    </div>
    </body>
</html>
